name: Deploy Collaboration Worker
on:
  push:
    branches: [main]
    paths:
      - 'workers/collab-worker/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/collab-worker
          command: deploy
