name: CI — Type Check & Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Vercel deploys automatically via its native GitHub integration.
# This workflow only validates the build so broken code never reaches production.

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
